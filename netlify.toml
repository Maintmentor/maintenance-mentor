[build]
  publish = "dist"
  functions = "netlify/functions"

[[redirects]]
  from = "https://www.maintenancementor.io/*"
  to = "https://maintenancementor.io/:splat"
  status = 301
  force = true

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
