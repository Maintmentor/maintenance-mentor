[build]
  publish = "dist"

[build.environment]
  NODE_VERSION = "18"

# Security and CORS headers for all pages
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(self), microphone=(), geolocation=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https: http:; font-src 'self' https:; connect-src 'self' https://kudlclzjfihbphehhiii.supabase.co https://*.supabase.co https://api.openai.com https://www.googleapis.com https://d64gsuwffb70l.cloudfront.net https:; media-src 'self' https:; frame-ancestors 'none'; upgrade-insecure-requests"

# Cache static assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Don't cache HTML
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# Service worker
[[headers]]
  for = "/service-worker.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# Redirect www to non-www
[[redirects]]
  from = "https://www.maintenancementor.io/*"
  to = "https://maintenancementor.io/:splat"
  status = 301
  force = true

# SPA fallback - must be last
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
