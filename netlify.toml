[build]
  publish = "dist"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# Redirect www to non-www
[[redirects]]
  from = "https://www.maintenancementor.io/*"
  to = "https://maintenancementor.io/:splat"
  status = 301
  force = true

# Ensure Netlify Functions are accessible (not caught by SPA fallback)
[[redirects]]
  from = "/.netlify/functions/*"
  to = "/.netlify/functions/:splat"
  status = 200

# SPA fallback - serve index.html for all routes (client-side routing)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
