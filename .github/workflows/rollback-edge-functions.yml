name: Rollback Edge Functions

on:
  workflow_dispatch:
    inputs:
      function_name:
        description: 'Function to rollback'
        required: true
        type: choice
        options:
          - health-check
          - repair-diagnostic
          - slack-alert-sender
          - storage-monitor
          - api-key-validator
          - trial-reminder-email
          - cache-alert-email-sender
          - image-cache-handler
      version:
        description: 'Git commit hash to rollback to'
        required: true
        type: string

jobs:
  rollback:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code at specific commit
        uses: actions/checkout@v3
        with:
          ref: ${{ github.event.inputs.version }}

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Supabase CLI
        run: npm install -g supabase

      - name: Rollback Function
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
        run: |
          supabase link --project-ref $SUPABASE_PROJECT_ID
          
          echo "Rolling back ${{ github.event.inputs.function_name }} to ${{ github.event.inputs.version }}"
          supabase functions deploy ${{ github.event.inputs.function_name }} --no-verify-jwt

      - name: Verify Rollback
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: |
          echo "Testing rolled back function..."
          curl -X POST "$VITE_SUPABASE_URL/functions/v1/${{ github.event.inputs.function_name }}" \
            -H "Authorization: Bearer $VITE_SUPABASE_ANON_KEY" \
            -H "Content-Type: application/json" \
            --fail || echo "Function test failed"

      - name: Create Rollback Summary
        run: |
          echo "## Rollback Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Function:** ${{ github.event.inputs.function_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ github.event.inputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "**Time:** $(date)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Rollback completed" >> $GITHUB_STEP_SUMMARY
