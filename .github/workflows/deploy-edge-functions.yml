name: Deploy Edge Functions

on:
  push:
    branches:
      - main
    paths:
      - 'supabase/functions/**'
      - '.github/workflows/deploy-edge-functions.yml'
  workflow_dispatch:
    inputs:
      function_name:
        description: 'Specific function to deploy (leave empty for all)'
        required: false
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Supabase CLI
        run: npm install -g supabase

      - name: Deploy Edge Functions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
        run: |
          # Link to Supabase project
          supabase link --project-ref $SUPABASE_PROJECT_ID
          
          # Deploy specific function or all functions
          if [ -n "${{ github.event.inputs.function_name }}" ]; then
            echo "Deploying function: ${{ github.event.inputs.function_name }}"
            supabase functions deploy ${{ github.event.inputs.function_name }} --no-verify-jwt
          else
            echo "Deploying all functions..."
            
            # List of functions to deploy
            FUNCTIONS=(
              "health-check"
              "repair-diagnostic"
              "slack-alert-sender"
              "storage-monitor"
              "api-key-validator"
              "trial-reminder-email"
              "cache-alert-email-sender"
              "image-cache-handler"
            )
            
            for func in "${FUNCTIONS[@]}"; do
              if [ -d "supabase/functions/$func" ]; then
                echo "Deploying $func..."
                supabase functions deploy "$func" --no-verify-jwt || echo "Failed to deploy $func"
              fi
            done
          fi

      - name: Test Deployed Functions
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: |
          echo "Testing health-check function..."
          curl -X POST "$VITE_SUPABASE_URL/functions/v1/health-check" \
            -H "Authorization: Bearer $VITE_SUPABASE_ANON_KEY" \
            -H "Content-Type: application/json" \
            --fail || echo "Health check test failed"

      - name: Create Deployment Summary
        run: |
          echo "## Edge Function Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Deployment completed at $(date)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Deployed Functions:" >> $GITHUB_STEP_SUMMARY
          ls -1 supabase/functions/ >> $GITHUB_STEP_SUMMARY
