name: ML Model Retraining

on:
  schedule:
    # Run weekly on Sundays at 2 AM UTC
    - cron: '0 2 * * 0'
  workflow_dispatch:
    inputs:
      job_type:
        description: 'Job type'
        required: false
        default: 'scheduled'

jobs:
  retrain-model:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger ML Retraining
        run: |
          curl -X POST "${{ secrets.SUPABASE_URL }}/functions/v1/translation-model-retrainer" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"jobType": "${{ github.event.inputs.job_type || 'scheduled' }}"}'

      - name: Send Notification
        if: always()
        run: |
          echo "ML model retraining job triggered successfully"
