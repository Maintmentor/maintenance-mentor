[build]
  command = "npm run build"
  publish = "dist"

# Environment variables for build
[build.environment]
  NODE_VERSION = "18"

# Redirect www to non-www
[[redirects]]
  from = "https://www.maintenancementor.io/*"
  to = "https://maintenancementor.io/:splat"
  status = 301
  force = true

# SPA fallback - must be last
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
