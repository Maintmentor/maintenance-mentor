name: Storage Monitoring

on:
  schedule:
    - cron: '0 */6 * * *'  # Run every 6 hours
  workflow_dispatch:

jobs:
  monitor-storage:
    runs-on: ubuntu-latest
    steps:
      - name: Monitor Storage Usage
        run: |
          curl -X POST \
            "${{ secrets.SUPABASE_URL }}/functions/v1/storage-monitor" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Content-Type: application/json"
      
      - name: Send Alert Notifications
        run: |
          curl -X POST \
            "${{ secrets.SUPABASE_URL }}/functions/v1/storage-alert-notifier" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Content-Type: application/json"