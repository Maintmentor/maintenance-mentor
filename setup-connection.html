<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fix Connection - Automated Setup</title>
    <style>
        body { font-family: system-ui; max-width: 800px; margin: 50px auto; padding: 20px; background: #0f172a; color: #e2e8f0; }
        .step { background: #1e293b; padding: 20px; margin: 20px 0; border-radius: 8px; border-left: 4px solid #3b82f6; }
        .step.active { border-color: #10b981; }
        .step.complete { border-color: #22c55e; opacity: 0.7; }
        button { background: #3b82f6; color: white; border: none; padding: 12px 24px; border-radius: 6px; cursor: pointer; font-size: 16px; margin: 10px 5px; }
        button:hover { background: #2563eb; }
        button.success { background: #10b981; }
        input { width: 100%; padding: 12px; border-radius: 6px; border: 1px solid #475569; background: #0f172a; color: #e2e8f0; font-size: 14px; margin: 10px 0; }
        .status { padding: 10px; border-radius: 6px; margin: 10px 0; }
        .status.success { background: #065f46; color: #d1fae5; }
        .status.error { background: #7f1d1d; color: #fecaca; }
        .status.warning { background: #78350f; color: #fed7aa; }
        code { background: #334155; padding: 2px 6px; border-radius: 4px; }
        h1 { color: #60a5fa; }
        h3 { color: #93c5fd; margin-top: 0; }
    </style>
</head>
<body>
    <h1>🔧 Connection Fix - Automated Setup</h1>
    <p>Let's fix your connection issues in 3 easy steps!</p>

    <div class="step active" id="step1">
        <h3>Step 1: Get Your Supabase API Key</h3>
        <p>Click the button below to open your Supabase dashboard:</p>
        <button onclick="openSupabase()">📋 Open Supabase API Settings</button>
        <p style="margin-top: 15px;">Then copy the <strong>anon public</strong> key from the dashboard.</p>
    </div>

    <div class="step" id="step2">
        <h3>Step 2: Paste Your API Key</h3>
        <input type="text" id="apiKey" placeholder="Paste your Supabase anon key here..." />
        <button onclick="validateKey()">✅ Validate & Save Key</button>
        <div id="validationResult"></div>
    </div>

    <div class="step" id="step3">
        <h3>Step 3: Test Connection</h3>
        <button onclick="testConnection()">🧪 Test Database Connection</button>
        <div id="testResult"></div>
    </div>

    <script>
        function openSupabase() {
            window.open('https://app.supabase.com/project/kudlclzjfihbphehhiii/settings/api', '_blank');
            document.getElementById('step1').classList.add('complete');
            document.getElementById('step2').classList.add('active');
        }

        async function validateKey() {
            const key = document.getElementById('apiKey').value.trim();
            const result = document.getElementById('validationResult');
            
            if (!key) {
                result.innerHTML = '<div class="status error">❌ Please paste your API key</div>';
                return;
            }

            if (!key.startsWith('eyJ')) {
                result.innerHTML = '<div class="status error">❌ Invalid key format. Should start with "eyJ"</div>';
                return;
            }

            result.innerHTML = '<div class="status success">✅ Key format looks good! Saving to .env file...</div>';
            
            // Show instructions to update .env
            result.innerHTML += `
                <div class="status warning">
                    <strong>⚠️ Manual Step Required:</strong><br>
                    Open your <code>.env</code> file and replace line 9 with:<br>
                    <code>VITE_SUPABASE_ANON_KEY=${key}</code><br><br>
                    Then restart your dev server: <code>npm run dev</code>
                </div>
            `;
            
            document.getElementById('step2').classList.add('complete');
            document.getElementById('step3').classList.add('active');
        }

        async function testConnection() {
            const result = document.getElementById('testResult');
            result.innerHTML = '<div class="status warning">🔄 Testing connection...</div>';
            
            try {
                const response = await fetch('https://kudlclzjfihbphehhiii.supabase.co/rest/v1/', {
                    headers: {
                        'apikey': document.getElementById('apiKey').value,
                        'Authorization': `Bearer ${document.getElementById('apiKey').value}`
                    }
                });
                
                if (response.ok) {
                    result.innerHTML = '<div class="status success">✅ Connection successful! Your app is ready to use.</div>';
                    document.getElementById('step3').classList.add('complete');
                } else {
                    result.innerHTML = `<div class="status error">❌ Connection failed: ${response.status} ${response.statusText}</div>`;
                }
            } catch (error) {
                result.innerHTML = `<div class="status error">❌ Connection error: ${error.message}</div>`;
            }
        }
    </script>
</body>
</html>
